name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build and attach release zip
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip

      - name: Build distribution package
        run: |
          ./scripts/build-release.sh

      - name: Verify package
        run: |
          test -f build/inventory.zip
          unzip -t build/inventory.zip

      - name: Attach package to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: build/inventory.zip
          generate_release_notes: true

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: inventory
          path: build/inventory.zip
